domain: sports
description: "Ground truth for sports IR Fidelity. Vision QA Engine loops over metrics directly."
version: "1.0"

ground_truth:
  "Action shot":
    expected_entity: sports_action
    expected_entity_type: person
    expected_camera_height: EYE
    expected_motion: DOLLY_PARALLEL
    expected_lighting: direct_dramatic
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: dolly}
        - {id: human_visible,           type: boolean, expected: true}
        - {id: focus_sharpness,         type: score,   min: 0.75}
        - {id: subject_coverage,        type: ratio,   min: 0.25}

  "Stadium":
    expected_entity: sports_venue
    expected_entity_type: structure
    expected_camera_height: DRONE_HIGH
    expected_motion: ORBIT
    expected_lighting: direct_dramatic
    expected_composition: centered_above
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: drone_high}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: orbit}
        - {id: primary_subject_type,    type: enum,    expected: structure}
        - {id: human_visible,           type: boolean, expected: true}

  "Athlete detail":
    expected_entity: subject
    expected_entity_type: person
    expected_camera_height: EYE
    expected_motion: DOLLY_PARALLEL
    expected_lighting: direct_dramatic
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: human_visible,           type: boolean, expected: true}
        - {id: subject_coverage,        type: ratio,   min: 0.4}
        - {id: focus_sharpness,         type: score,   min: 0.8}

  "Arena reveal":
    expected_entity: sports_venue
    expected_entity_type: structure
    expected_camera_height: EYE
    expected_motion: TILT_UP
    expected_lighting: direct_dramatic
    expected_composition: vertical_reveal
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: tilt}
        - {id: primary_subject_type,    type: enum,    expected: structure}
        - {id: human_visible,           type: boolean, expected: true}

  "Sprint finish":
    expected_entity: sports_action
    expected_entity_type: person
    expected_camera_height: KNEE
    expected_motion: DOLLY_PARALLEL
    expected_lighting: direct_dramatic
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: knee}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: dolly}
        - {id: human_visible,           type: boolean, expected: true}
        - {id: subject_coverage,        type: ratio,   min: 0.3}

  "Team celebration":
    expected_entity: subject
    expected_entity_type: person
    expected_camera_height: EYE
    expected_motion: ORBIT
    expected_lighting: direct_dramatic
    expected_composition: centered_group
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: orbit}
        - {id: human_visible,           type: boolean, expected: true}
        - {id: subject_coverage,        type: ratio,   min: 0.4}

  "Equipment detail":
    expected_entity: sports_action
    expected_entity_type: person
    expected_camera_height: EYE
    expected_motion: SLOW_PUSH
    expected_lighting: direct_dramatic
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: subject_coverage,        type: ratio,   min: 0.6}
        - {id: focus_sharpness,         type: score,   min: 0.85}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: human_visible,           type: boolean, expected: false}

  "Crowd panorama":
    expected_entity: sports_venue
    expected_entity_type: structure
    expected_camera_height: DRONE_LOW
    expected_motion: STATIC
    expected_lighting: direct_dramatic
    expected_composition: panoramic
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: drone_low}
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: human_visible,           type: boolean, expected: true}
        - {id: subject_coverage,        type: ratio,   min: 0.5}
