domain: automotive
description: "Automotive cinematography — studio, exterior reveals, material details, dynamic tracking"
version: "1.0"

shots:
  - scene_title: "Studio hero shot"
    emo: CRAFT
    cam: WIDE
    move: STATIC
    dur: 6.0
    lens: "50"
    light: S2
    notes: "Three-quarter hero angle; controlled studio lighting; car as sculpture"

  - scene_title: "Glass roof detail"
    emo: CRAFT
    cam: CLOSE
    move: P1
    dur: 4.0
    lens: "135"
    light: S1
    notes: "Macro on glass panel; surface reflections and refractions"

  - scene_title: "Car reveal"
    emo: REVEAL
    cam: WIDE
    move: O1
    dur: 5.0
    lens: "35"
    light: D1
    notes: "Orbital reveal around exterior; dynamic lighting shift"

  - scene_title: "Car tracking"
    emo: POWER
    cam: MEDIUM
    move: D1
    dur: 3.0
    lens: "85"
    light: D1
    notes: "Side-angle dolly tracking; motion blur on wheels"

  - scene_title: "Wheel detail"
    emo: CRAFT
    cam: CLOSE
    move: O1
    dur: 4.0
    lens: "135"
    light: S1
    notes: "Low angle orbit around wheel; brake disc and caliper visible"

  - scene_title: "Interior cockpit"
    emo: CRAFT
    cam: CLOSE
    move: P1
    dur: 5.0
    lens: "24"
    light: S1
    notes: "Driver POV push; steering wheel, dashboard, gauges"

  - scene_title: "Carbon fiber texture"
    emo: CRAFT
    cam: CLOSE
    move: P1
    dur: 4.0
    lens: "135"
    light: S1
    notes: "Weave pattern of carbon fiber; high specular light"

  - scene_title: "Road launch"
    emo: POWER
    cam: MEDIUM
    move: D1
    dur: 3.0
    lens: "35"
    light: D1
    notes: "Low angle tracking; launch acceleration from standstill"
