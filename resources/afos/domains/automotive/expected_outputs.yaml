domain: automotive
description: "Ground truth for automotive IR Fidelity. Vision QA Engine loops over metrics directly."
version: "1.0"

ground_truth:
  "Studio hero shot":
    expected_entity: studio_setup
    expected_entity_type: structure
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: studio_controlled
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: studio}
        - {id: primary_subject_type,    type: enum,    expected: vehicle}
        - {id: human_visible,           type: boolean, expected: false}

  "Glass roof detail":
    expected_entity: glass_panel
    expected_entity_type: material
    expected_camera_height: ABOVE_HEAD
    expected_motion: SLOW_PUSH
    expected_lighting: studio_controlled
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: subject_coverage,        type: ratio,   min: 0.7}
        - {id: focus_sharpness,         type: score,   min: 0.8}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: lighting_quality,        type: enum,    expected: studio}
        - {id: motion_type,             type: enum,    expected: slow_push}

  "Car reveal":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: EYE
    expected_motion: ORBIT
    expected_lighting: dynamic_dramatic
    expected_composition: full_frame_reveal
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: orbit}
        - {id: primary_subject_type,    type: enum,    expected: vehicle}
        - {id: human_visible,           type: boolean, expected: false}

  "Car tracking":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: EYE
    expected_motion: DOLLY_PARALLEL
    expected_lighting: dynamic_dramatic
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: dolly}
        - {id: primary_subject_type,    type: enum,    expected: vehicle}
        - {id: subject_coverage,        type: ratio,   min: 0.3}

  "Wheel detail":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: ANKLE
    expected_motion: ORBIT
    expected_lighting: studio_controlled
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: subject_coverage,        type: ratio,   min: 0.6}
        - {id: camera_height,           type: enum,    expected: ankle}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: lighting_quality,        type: enum,    expected: studio}

  "Interior cockpit":
    expected_entity: interior
    expected_entity_type: interior
    expected_camera_height: EYE
    expected_motion: SLOW_PUSH
    expected_lighting: studio_controlled
    expected_composition: centered
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: slow_push}
        - {id: primary_subject_type,    type: enum,    expected: interior}
        - {id: human_visible,           type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: studio}

  "Carbon fiber texture":
    expected_entity: composite_material
    expected_entity_type: material
    expected_camera_height: EYE
    expected_motion: SLOW_PUSH
    expected_lighting: studio_controlled
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: subject_coverage,        type: ratio,   min: 0.8}
        - {id: focus_sharpness,         type: score,   min: 0.85}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: lighting_quality,        type: enum,    expected: studio}

  "Road launch":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: ANKLE
    expected_motion: DOLLY_PARALLEL
    expected_lighting: dynamic_dramatic
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: ankle}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: dolly}
        - {id: primary_subject_type,    type: enum,    expected: vehicle}
