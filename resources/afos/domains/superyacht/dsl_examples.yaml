domain: superyacht
description: "Superyacht cinematography — hull reveals, deck materials, ocean horizons, tender launches"
version: "1.0"

shots:
  - scene_title: "Hull reflection"
    emo: CALM
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "85"
    light: G1
    notes: "Hull line meets water surface; reflection geometry"

  - scene_title: "Teak deck material"
    emo: CRAFT
    cam: CLOSE
    move: P1
    dur: 4.0
    lens: "135"
    light: G2
    notes: "Macro push into teak grain; caulking lines as graphic element"

  - scene_title: "Ocean horizon view"
    emo: AWE
    cam: WIDE
    move: STATIC
    dur: 6.0
    lens: "35"
    light: G1
    notes: "Infinity view from deck; ocean and sky meeting at horizon"

  - scene_title: "Yacht bow reveal"
    emo: REVEAL
    cam: WIDE
    move: D1
    dur: 5.0
    lens: "50"
    light: D1
    notes: "Low angle dolly from stern to bow; hull profile reveal"

  - scene_title: "Sundeck lounge"
    emo: CALM
    cam: MEDIUM
    move: STATIC
    dur: 5.0
    lens: "50"
    light: G1
    notes: "Lounge area with ocean in background; negative space up"

  - scene_title: "Tender garage"
    emo: CRAFT
    cam: MEDIUM
    move: P1
    dur: 4.0
    lens: "85"
    light: A1
    notes: "Tender inside garage with exterior light framing entrance"

  - scene_title: "Night bridge"
    emo: CALM
    cam: MEDIUM
    move: STATIC
    dur: 5.0
    lens: "35"
    light: A1
    notes: "Bridge instruments and night sea; dashboard glow"

  - scene_title: "Aerial yacht approach"
    emo: AWE
    cam: WIDE
    move: D1
    dur: 6.0
    lens: "24"
    light: G1
    notes: "Drone descends to meet yacht from above; scale reveal"
