domain: superyacht
description: "Ground truth for superyacht IR Fidelity. Vision QA Engine loops over metrics directly."
version: "1.0"

ground_truth:
  "Hull reflection":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: ANKLE
    expected_motion: STATIC
    expected_lighting: golden_hour
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: reflection_visible,      type: boolean, expected: true}
        - {id: camera_height,           type: enum,    expected: ankle}
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: golden_hour}
        - {id: water_surface_coverage,  type: ratio,   min: 0.3}

  "Teak deck material":
    expected_entity: teak
    expected_entity_type: material
    expected_camera_height: ABOVE_HEAD
    expected_motion: SLOW_PUSH
    expected_lighting: overcast_soft
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: subject_coverage,        type: ratio,   min: 0.7}
        - {id: focus_sharpness,         type: score,   min: 0.8}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: slow_push}
        - {id: lighting_quality,        type: enum,    expected: overcast}

  "Ocean horizon view":
    expected_entity: ocean
    expected_entity_type: water_feature
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: golden_hour
    expected_composition: horizon_thirds
    qa:
      metrics:
        - {id: water_surface_coverage,  type: ratio,   min: 0.5}
        - {id: sky_coverage,            type: ratio,   min: 0.3, max: 0.5}
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: golden_hour}
        - {id: dominant_color_temp,     type: enum,    expected: warm}

  "Yacht bow reveal":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: ANKLE
    expected_motion: DOLLY_FORWARD
    expected_lighting: dynamic_dramatic
    expected_composition: leading_lines
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: ankle}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: dolly}
        - {id: primary_subject_type,    type: enum,    expected: vehicle}

  "Sundeck lounge":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: golden_hour
    expected_composition: negative_space_up
    qa:
      metrics:
        - {id: sky_coverage,            type: ratio,   min: 0.3}
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: golden_hour}
        - {id: dominant_color_temp,     type: enum,    expected: warm}

  "Tender garage":
    expected_entity: interior
    expected_entity_type: interior
    expected_camera_height: EYE
    expected_motion: SLOW_PUSH
    expected_lighting: artificial_interior
    expected_composition: tunnel_depth
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: slow_push}
        - {id: primary_subject_type,    type: enum,    expected: interior}

  "Night bridge":
    expected_entity: interior
    expected_entity_type: interior
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: artificial_night
    expected_composition: centered
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: artificial_night}
        - {id: primary_subject_type,    type: enum,    expected: interior}
        - {id: dominant_color_temp,     type: enum,    expected: cool}

  "Aerial yacht approach":
    expected_entity: vehicle
    expected_entity_type: vehicle
    expected_camera_height: DRONE_HIGH
    expected_motion: DOLLY_DESCEND
    expected_lighting: golden_hour
    expected_composition: centered_above
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: drone_high}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: lighting_quality,        type: enum,    expected: golden_hour}
        - {id: primary_subject_type,    type: enum,    expected: vehicle}
        - {id: water_surface_coverage,  type: ratio,   min: 0.4}
