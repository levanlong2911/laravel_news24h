domain: luxury_villa
description: "Luxury villa and resort cinematography — poolside, materials, terraces, architectural reveals"
version: "1.0"

shots:
  - scene_title: "Pool at dawn"
    emo: CALM
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "85"
    light: G1
    notes: "Mirror-perfect water surface at golden hour; camera at ankle height"

  - scene_title: "Stone detail"
    emo: CRAFT
    cam: CLOSE
    move: P1
    dur: 4.0
    lens: "135"
    light: G2
    notes: "Extreme macro on travertine surface; slow push into texture"

  - scene_title: "Terrace view"
    emo: CALM
    cam: MEDIUM
    move: STATIC
    dur: 6.0
    lens: "50"
    light: W1
    notes: "Terrace framing landscape beyond; negative space right"

  - scene_title: "Villa reveal"
    emo: REVEAL
    cam: WIDE
    move: T1
    dur: 5.0
    lens: "35"
    light: G1
    notes: "Slow tilt reveals full facade from pool foreground"

  - scene_title: "Interior living room"
    emo: CALM
    cam: MEDIUM
    move: STATIC
    dur: 5.0
    lens: "24"
    light: W1
    notes: "Sun-lit interior with depth layers; furniture in foreground"

  - scene_title: "Poolside at sunset"
    emo: CALM
    cam: WIDE
    move: STATIC
    dur: 6.0
    lens: "50"
    light: G1
    notes: "Warm backlit; pool in foreground, villa in background"

  - scene_title: "Garden landscape"
    emo: CALM
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "35"
    light: G2
    notes: "Manicured garden with layered depth; no architectural dominance"

  - scene_title: "Night pool illumination"
    emo: CALM
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "85"
    light: A1
    notes: "Pool light from below; deep blue ambient sky above"
