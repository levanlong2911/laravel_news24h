domain: architecture
description: "Ground truth for architecture IR Fidelity. Vision QA Engine loops over metrics directly."
version: "1.0"

ground_truth:
  "Glass facade exterior":
    expected_entity: glass_panel
    expected_entity_type: material
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: overcast_soft
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: overcast}
        - {id: reflection_visible,      type: boolean, expected: true}
        - {id: subject_coverage,        type: ratio,   min: 0.5}

  "Interior lobby atrium":
    expected_entity: interior
    expected_entity_type: interior
    expected_camera_height: EYE
    expected_motion: TILT_UP
    expected_lighting: warm_window
    expected_composition: vertical_reveal
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: tilt}
        - {id: lighting_quality,        type: enum,    expected: warm_window}
        - {id: primary_subject_type,    type: enum,    expected: interior}
        - {id: sky_coverage,            type: ratio,   max: 0.2}

  "Stone wall texture":
    expected_entity: stone
    expected_entity_type: material
    expected_camera_height: EYE
    expected_motion: SLOW_PUSH
    expected_lighting: overcast_soft
    expected_composition: centered_macro
    qa:
      metrics:
        - {id: subject_coverage,        type: ratio,   min: 0.75}
        - {id: focus_sharpness,         type: score,   min: 0.8}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: slow_push}
        - {id: lighting_quality,        type: enum,    expected: overcast}

  "Building aerial reveal":
    expected_entity: villa_facade
    expected_entity_type: structure
    expected_camera_height: DRONE_HIGH
    expected_motion: TILT_DOWN
    expected_lighting: overcast_soft
    expected_composition: centered_above
    qa:
      metrics:
        - {id: camera_height,           type: enum,    expected: drone_high}
        - {id: camera_motion_present,   type: boolean, expected: true}
        - {id: motion_type,             type: enum,    expected: tilt}
        - {id: primary_subject_type,    type: enum,    expected: structure}

  "Staircase detail":
    expected_entity: interior
    expected_entity_type: interior
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: warm_window
    expected_composition: diagonal_leading
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: warm_window}
        - {id: primary_subject_type,    type: enum,    expected: interior}
        - {id: human_visible,           type: boolean, expected: false}

  "Courtyard space":
    expected_entity: terrace
    expected_entity_type: arch_element
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: warm_window
    expected_composition: centered_framed
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: warm_window}
        - {id: primary_subject_type,    type: enum,    expected: arch_element}
        - {id: sky_coverage,            type: ratio,   min: 0.2}

  "Facade shadow play":
    expected_entity: villa_facade
    expected_entity_type: arch_element
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: direct_sun
    expected_composition: rule_of_thirds
    qa:
      metrics:
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: direct_sun}
        - {id: subject_coverage,        type: ratio,   min: 0.5}

  "Rooftop terrace":
    expected_entity: terrace
    expected_entity_type: arch_element
    expected_camera_height: EYE
    expected_motion: STATIC
    expected_lighting: golden_hour
    expected_composition: negative_space_up
    qa:
      metrics:
        - {id: sky_coverage,            type: ratio,   min: 0.35}
        - {id: camera_motion_present,   type: boolean, expected: false}
        - {id: lighting_quality,        type: enum,    expected: golden_hour}
        - {id: dominant_color_temp,     type: enum,    expected: warm}
