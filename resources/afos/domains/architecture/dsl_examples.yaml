domain: architecture
description: "Architectural cinematography — facades, interiors, materials, spatial reveals"
version: "1.0"

shots:
  - scene_title: "Glass facade exterior"
    emo: CRAFT
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "35"
    light: D1
    notes: "Full facade with reflections; sky reflected in glass curtain wall"

  - scene_title: "Interior lobby atrium"
    emo: CALM
    cam: MEDIUM
    move: P1
    dur: 6.0
    lens: "24"
    light: W1
    notes: "Vertical push reveals atrium height; natural light from above"

  - scene_title: "Stone wall texture"
    emo: CRAFT
    cam: CLOSE
    move: P1
    dur: 4.0
    lens: "135"
    light: D1
    notes: "Macro on stone cladding; joint lines and texture"

  - scene_title: "Building aerial reveal"
    emo: REVEAL
    cam: WIDE
    move: T1
    dur: 5.0
    lens: "24"
    light: D1
    notes: "Aerial tilt down reveals building in urban context"

  - scene_title: "Staircase detail"
    emo: CRAFT
    cam: MEDIUM
    move: STATIC
    dur: 5.0
    lens: "50"
    light: W1
    notes: "Floating staircase with dramatic shadow lines"

  - scene_title: "Courtyard space"
    emo: CALM
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "35"
    light: W1
    notes: "Enclosed courtyard with sky above; human scale reference"

  - scene_title: "Facade shadow play"
    emo: CRAFT
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "50"
    light: D1
    notes: "Dramatic shadow patterns from brise-soleil on facade"

  - scene_title: "Rooftop terrace"
    emo: AWE
    cam: WIDE
    move: STATIC
    dur: 5.0
    lens: "35"
    light: G1
    notes: "Rooftop with cityscape or landscape beyond; sky as ceiling"
